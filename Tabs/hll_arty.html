<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=0">
<title>HLL Artillery Calculator</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    justify-content: space-between;
}

.container {
    padding: 20px;
}


h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 20px;
}

button {
    touch-action: manipulation;
}

select {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
}

.input-field {
    font-size: 28px;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    text-align: center;
    background: #2a2a2a;
    color: white;
}

.active {
    border: 3px solid #4CAF50;
}

.result {
    margin-top: 15px;
    font-size: 26px;
    text-align: center;
    color: #4CAF50;
}

.keypad {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    background: #000;
}

.keypad button {
    font-size: 24px;
    padding: 20px;
    border-radius: 12px;
    border: none;
    color: black;
}

.keypad button:active {
    opacity: 0.7;
}

.full-row {
    grid-column: span 3;
}

.sign-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.sign-minus {
    background: #aa3333;
}

.sign-plus {
    background: #2e7d32;
}

.confirm {
    background: #4CAF50;
}

.zero-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
}

.erase {
    background: yellow;
}
</style>
</head>

<body x-data="calculator()">

<div class="container">
    <select x-model="selectedType" @change="calculate()">
        <option value="spa_germany">SPA Germany</option>
                <option value="spa_usa">SPA USA</option>
                                <option value="spa_russia">SPA Russia</option>
                                      <option value="spa_brit">SPA Brits</option>
        <option value="german_usa">SA German / USA v0.3</option>
        <option value="soviet">SA Soviet</option>
        <option value="british">SA British</option>
    </select>

    <!-- Distance -->
    <div class="input-field"
         :class="{ 'active': activeField === 'meter' }"
         @click="activeField = 'meter'"
         x-text="meter || 'Enter Distance (m)'">
    </div>

    <!-- Adjustment -->
    <div class="input-field"
         :class="{ 'active': activeField === 'elevation' }"
         @click="activeField = 'elevation'"
         x-text="elevationDisplay || 'Adjustment (± mils)'">
    </div>

    <div class="result" x-show="result !== null">
        Target Mils: <span x-text="result"></span>
    </div>

</div>

<div class="keypad">

    <!-- 1-9 -->
    <template x-for="n in [1,2,3,4,5,6,7,8,9]" :key="n">
        <button @click="append(n)" x-text="n"></button>
    </template>

    <!-- Zero + Erase row -->
    <div class="zero-row full-row">
            
        <button @click="append(0)">0</button>
    <button class="erase" @click="remove()">⌫</button>
    </div>

    <!-- Sign row in nested grid -->
    <div class="sign-container full-row">
        <button class="sign-minus" @click="setSign('-')">−</button>
        <button class="sign-plus" @click="setSign('+')">+</button>
    </div>

    <!-- Next full row -->
    <button class="confirm full-row" @click="next()">Next</button>

</div>

<script>
function calculator() {
    return {

        parameters: {
            german_usa: 4.17,
            soviet: 4.17,
            british: 4.17,
        },

        // SPA lookup tables (interpolation)
        spaTables: {
            spa_germany: [
                { m: 200, mil: 100 },
                { m: 220, mil: 117 },
                { m: 240, mil: 135 },
                { m: 260, mil: 153 },
                { m: 280, mil: 171 },
                { m: 300, mil: 188 },
                { m: 320, mil: 206 },
                { m: 340, mil: 224 },
                { m: 360, mil: 242 },
                { m: 380, mil: 260 },
                { m: 400, mil: 277 },
                { m: 420, mil: 295 },
                { m: 440, mil: 313 },
                { m: 460, mil: 331 },
                { m: 480, mil: 348 },
                { m: 500, mil: 366 },
            ],
            spa_usa: [
    { m: 200, mil: 100 },
    { m: 225, mil: 116 },
    { m: 250, mil: 133 },
    { m: 275, mil: 150 },
    { m: 300, mil: 166 },
    { m: 325, mil: 183 },
    { m: 350, mil: 200 },
    { m: 375, mil: 216 },
    { m: 400, mil: 233 },
    { m: 425, mil: 250 },
    { m: 450, mil: 266 },
    { m: 475, mil: 283 },
    { m: 500, mil: 300 },
    { m: 525, mil: 316 },
    { m: 550, mil: 333 },
    { m: 575, mil: 350 },
    { m: 600, mil: 366 },
],
       spa_russia: [
    { m: 200, mil: 100 },
    { m: 225, mil: 116 },
    { m: 250, mil: 133 },
    { m: 275, mil: 150 },
    { m: 300, mil: 166 },
    { m: 325, mil: 183 },
    { m: 350, mil: 200 },
    { m: 375, mil: 216 },
    { m: 400, mil: 233 },
    { m: 425, mil: 250 },
    { m: 450, mil: 266 },
    { m: 475, mil: 283 },
    { m: 500, mil: 300 },
    { m: 525, mil: 316 },
    { m: 550, mil: 333 },
    { m: 575, mil: 350 },
    { m: 600, mil: 366 },
],
      spa_brit: [
    { m: 100, mil: 100 },
    { m: 110, mil: 110 },
    { m: 120, mil: 120 },
    { m: 130, mil: 131 },
    { m: 140, mil: 141 },
    { m: 150, mil: 152 },
    { m: 160, mil: 162 },
    { m: 170, mil: 173 },
    { m: 180, mil: 183 },
    { m: 190, mil: 194 },
    { m: 200, mil: 204 },
    { m: 210, mil: 215 },
    { m: 220, mil: 225 },
    { m: 230, mil: 235 },  // corrected
    { m: 240, mil: 246 },
    { m: 250, mil: 256 },
]
        },

        selectedType: 'german_usa',

        meter: '',
        elevation: '',
        elevationSign: '+',
        activeField: 'meter',
        result: null,

        get elevationDisplay() {
            return this.elevation ? this.elevationSign + this.elevation : '';
        },

        append(n) {
            if (this.activeField === 'meter') {
                this.meter += n;
            } else {
                this.elevation += n;
            }
            this.calculate();
        },

        remove() {
            if (this.activeField === 'meter') {
                this.meter = this.meter.slice(0, -1);
            } else {
                this.elevation = this.elevation.slice(0, -1);
            }
            this.calculate();
        },

        setSign(sign) {
            if (this.activeField === 'elevation') {
                this.elevationSign = sign;
                this.calculate();
            }
        },

        next() {
            if (this.activeField === 'meter') {
                if (this.meter !== '') {
                    this.activeField = 'elevation';
                }
            } else {
                this.meter = '';
                this.activeField = 'meter';
                this.result = null;
            }
        },

        // 🔥 NEW: unified base mil calculation
 getBaseMil(meters) {
    // SPA handling
    if (this.selectedType.startsWith('spa')) {
        const table = this.spaTables[this.selectedType];
        if (!table || table.length < 2) return null; // need at least 2 points for extrapolation

        // BELOW table range → linear extrapolate
        if (meters < table[0].m) {
            const a = table[0];
            const b = table[1];
            const slope = (b.mil - a.mil) / (b.m - a.m);
            return a.mil + slope * (meters - a.m);
        }

        // ABOVE table range → linear extrapolate
        if (meters > table[table.length - 1].m) {
            const a = table[table.length - 2];
            const b = table[table.length - 1];
            const slope = (b.mil - a.mil) / (b.m - a.m);
            return b.mil + slope * (meters - b.m);
        }

        // INTERPOLATE inside range
        for (let i = 0; i < table.length - 1; i++) {
            const a = table[i];
            const b = table[i + 1];
            if (meters >= a.m && meters <= b.m) {
                const t = (meters - a.m) / (b.m - a.m);
                return a.mil + t * (b.mil - a.mil);
            }
        }

        return null;
    }

    // default artillery formula
    const parameter = this.parameters[this.selectedType];
    if (!parameter) return null;

    return 1000 - (meters / parameter);
},

        calculate() {
            const meters = parseInt(this.meter);
            const adjustment = parseInt(this.elevationSign + this.elevation) || 0;

            if (!meters) {
                this.result = null;
                return;
            }

            const baseMil = this.getBaseMil(meters);

            if (baseMil === null) {
                this.result = null;
                return;
            }

            this.result = Math.round(baseMil + adjustment);
        }
    }
}
</script>

</body>
</html>
