<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=0">
<title>HLL Artillery Calculator</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    justify-content: space-between;
}

.container {
    padding: 20px;
}


h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 20px;
}

button {
    touch-action: manipulation;
}

select {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
}

.input-field {
    font-size: 28px;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    text-align: center;
    background: #2a2a2a;
    color: white;
}

.active {
    border: 3px solid #4CAF50;
}

.result {
    margin-top: 15px;
    font-size: 26px;
    text-align: center;
    color: #4CAF50;
}

.keypad {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    background: #000;
}

.keypad button {
    font-size: 24px;
    padding: 20px;
    border-radius: 12px;
    border: none;
    color: black;
}

.keypad button:active {
    opacity: 0.7;
}

.full-row {
    grid-column: span 3;
}

.sign-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.sign-minus {
    background: #aa3333;
}

.sign-plus {
    background: #2e7d32;
}

.confirm {
    background: #4CAF50;
}

.zero-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
}

.erase {
    background: yellow;
}
</style>
</head>

<body x-data="calculator()">

<div class="container">
    <select x-model="selectedType" @change="calculate()">
        <option value="spa">SPA Tank</option>
        <option value="german_usa">SA German / USA v0.2</option>
        <option value="soviet">SA Soviet</option>
        <option value="british">SA British</option>
    </select>

    <!-- Distance -->
    <div class="input-field"
         :class="{ 'active': activeField === 'meter' }"
         @click="activeField = 'meter'"
         x-text="meter || 'Enter Distance (m)'">
    </div>

    <!-- Adjustment -->
    <div class="input-field"
         :class="{ 'active': activeField === 'elevation' }"
         @click="activeField = 'elevation'"
         x-text="elevationDisplay || 'Adjustment (± mils)'">
    </div>

    <div class="result" x-show="result !== null">
        Target Mils: <span x-text="result"></span>
    </div>

</div>

<div class="keypad">

    <!-- 1-9 -->
    <template x-for="n in [1,2,3,4,5,6,7,8,9]" :key="n">
        <button @click="append(n)" x-text="n"></button>
    </template>

    <!-- Zero + Erase row -->
    <div class="zero-row full-row">
            
        <button @click="append(0)">0</button>
    <button class="erase" @click="remove()">⌫</button>
    </div>

    <!-- Sign row in nested grid -->
    <div class="sign-container full-row">
        <button class="sign-minus" @click="setSign('-')">−</button>
        <button class="sign-plus" @click="setSign('+')">+</button>
    </div>

    <!-- Next full row -->
    <button class="confirm full-row" @click="next()">Next</button>

</div>

<script>
function calculator() {
    return {

        parameters: {
            spa: 4.17,
            german_usa: 4.17,
            soviet: 4.17,
            british: 4.17,
        },

        selectedType: 'german_usa',

        meter: '',
        elevation: '',
        elevationSign: '+',
        activeField: 'meter',
        result: null,

        get elevationDisplay() {
            return this.elevation ? this.elevationSign + this.elevation : '';
        },

        append(n) {
            if (this.activeField === 'meter') {
                this.meter += n;
            } else {
                this.elevation += n;
            }
            this.calculate();
        },

        remove() {
            if (this.activeField === 'meter') {
                this.meter = this.meter.slice(0, -1);
            } else {
                this.elevation = this.elevation.slice(0, -1);
            }
            this.calculate();
        },

        setSign(sign) {
            if (this.activeField === 'elevation') {
                this.elevationSign = sign;
                this.calculate();
            }
        },

        next() {
            if (this.activeField === 'meter') {
                if (this.meter !== '') {
                    this.activeField = 'elevation';
                }
            } else {
                // Clear both fields and reset sign
                this.meter = '';
                this.activeField = 'meter';
                this.result = null;
            }
        },

        calculate() {
            const meters = parseInt(this.meter);
            const adjustment = parseInt(this.elevationSign + this.elevation) || 0;
            const parameter = this.parameters[this.selectedType];

            if (!meters || !parameter) {
                this.result = null;
                return;
            }

            const baseMil = 1000 - (meters / parameter);
            this.result = Math.round(baseMil + adjustment);
        }
    }
}
</script>

</body>
</html>
